<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Health Hub" />
    <meta name="theme-color" content="#080808" />

    <!-- iOS Icons (real <link> tags, NOT inside scripts) -->
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="./icons/icon-120.png" />
    <link rel="apple-touch-icon"                href="./icons/icon-180.png" />

    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />
    <title>Health Hub</title>

    <!-- Inline theme: fires before any JS bundle → zero FOUC -->
    <script>
      try {
        var t = localStorage.getItem('hh_theme') || 'dark';
        document.documentElement.dataset.theme =
          t === 'auto'
            ? (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
            : t;
      } catch(e) {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>

    <!-- Content Security Policy
         Restricts resource origins. Adjust connect-src if adding external APIs.
         Note: GitHub Pages does not support custom HTTP headers via _headers.
         This meta tag is a best-effort CSP for all hosting environments. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' 'unsafe-inline';
      style-src   'self' 'unsafe-inline';
      img-src     'self' data: blob:;
      font-src    'self';
      connect-src 'self';
      worker-src  'self' blob:;
    ">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
